name: refresh-etf-data

# 평일 장 마감 후(KST 16:10 = UTC 07:10) 자동 갱신 + 수동 실행
on:
  schedule:
    - cron: "10 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Build data (KRX snapshot + 운용사 PDF + 비중 cap)
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: |
          cd scripts
          python refresh_all.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "data: 자동 갱신 ($(date -u +%Y-%m-%d))"
            git push
          fi
